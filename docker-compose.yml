services:
  api:
    build:
      context: .
      target: development
    ports:
      - '${PORT:-8080}:8080'
    environment:
      NODE_ENV: development
      PORT: 8080
      LOG_LEVEL: debug
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: jinfeng
      DB_PASSWORD: local_dev_only
      DB_DATABASE: jinfeng_local
      JWT_SECRET: local-dev-only-secret-do-not-use-in-prod
      JWT_EXPIRES_IN: 1d
      BCRYPT_SALT_ROUNDS: 10
      CORS_ALLOWED_ORIGINS: ''
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.0.33
    environment:
      MYSQL_ROOT_PASSWORD: local_dev_only
      MYSQL_DATABASE: jinfeng_local
      MYSQL_USER: jinfeng
      MYSQL_PASSWORD: local_dev_only
    ports:
      - '${DB_HOST_PORT:-3306}:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-u', 'root', '-plocal_dev_only']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:
  api_node_modules:
